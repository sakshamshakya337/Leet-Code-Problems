name: LeetCode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Compiler
        run: g++ --version

      - name: Compile All LeetCode Solutions
        run: |
          echo "Scanning for .cpp files..."
          failed=0
          total=0
          passed=0

          # Standard headers that cover 99% of LeetCode problems
          HEADER='#include <bits/stdc++.h>
          using namespace std;'

          for file in $(find . -name "*.cpp" -not -path "./.github/*" -not -name "main.cpp"); do
            total=$((total + 1))
            echo "──────────────────────────────"
            echo "Compiling: $file"

            # Create a temp file: inject headers + solution + empty main
            TMPFILE=$(mktemp /tmp/leetcode_XXXXXX.cpp)
            echo "$HEADER" > "$TMPFILE"
            cat "$file" >> "$TMPFILE"
            echo "" >> "$TMPFILE"
            echo "int main() { return 0; }" >> "$TMPFILE"

            if g++ -Wall -std=c++17 -o /tmp/leetcode_out "$TMPFILE" 2>&1; then
              echo "✅ PASS: $file"
              passed=$((passed + 1))
            else
              echo "❌ FAIL: $file"
              failed=1
            fi

            rm -f "$TMPFILE"
          done

          echo "══════════════════════════════"
          echo "Results: $passed / $total passed"
          echo "══════════════════════════════"
          exit $failed

      - name: All solutions passed
        if: success()
        run: echo "🎉 All LeetCode solutions compiled successfully!"
