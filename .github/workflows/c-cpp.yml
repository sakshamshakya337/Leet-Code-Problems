name: LeetCode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Compiler
        run: g++ --version

      - name: Compile All LeetCode Solutions
        run: |
          echo "Scanning for .cpp files..."
          failed=0
          total=0
          passed=0

          for file in $(find . -name "*.cpp" -not -path "./.github/*"); do
            total=$((total + 1))
            echo "──────────────────────────────"
            echo "Compiling: $file"
            if g++ -Wall -std=c++17 -o /tmp/leetcode_out "$file" 2>&1; then
              echo "✅ PASS: $file"
              passed=$((passed + 1))
            else
              echo "❌ FAIL: $file"
              failed=1
            fi
          done

          echo "══════════════════════════════"
          echo "Results: $passed / $total passed"
          echo "══════════════════════════════"
          exit $failed

      - name: Summary
        if: success()
        run: echo "🎉 All solutions compiled successfully!"
